<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff00"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bgGrad)"/>

  <!-- Border -->
  <rect x="8" y="8" width="496" height="496" rx="72" fill="none" stroke="#21262d" stroke-width="8"/>

  <!-- Terminal dots -->
  <circle cx="60" cy="60" r="18" fill="#ff5f56"/>
  <circle cx="110" cy="60" r="18" fill="#ffbd2e"/>
  <circle cx="160" cy="60" r="18" fill="#27ca40"/>

  <!-- Main text "AK" with glow -->
  <text x="256" y="320"
        font-family="JetBrains Mono, Monaco, Consolas, monospace"
        font-size="220"
        font-weight="700"
        fill="url(#greenGrad)"
        text-anchor="middle"
        filter="url(#glow)">
    AK
  </text>

  <!-- Cursor -->
  <rect x="390" y="180" width="20" height="160" fill="#00ff00" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom prompt -->
  <text x="60" y="460"
        font-family="JetBrains Mono, Monaco, Consolas, monospace"
        font-size="36"
        fill="#8b949e">
    <tspan fill="#00ff00">$</tspan> dev_
  </text>
</svg>
